services:
  # Your existing Streamlit application configuration remains here
  - type: web
    name: rag-knowledge-assistant
    runtime: python
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: >-
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection true
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: PINECONE_INDEX_NAME
        value: rag-knowledge-base
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 1-1sQtFd_zVRE4H4R-rrOGCZnzYdQQ8Zb
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false

  # The corrected Webhook Listener service
  - type: web
    name: rag-webhook-listener
    runtime: python
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install --no-cache-dir -r requirements.txt
    # uvicorn reads the $PORT environment variable automatically assigned by Render
    startCommand: uvicorn webhook_listener:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 1-1sQtFd_zVRE4H4R-rrOGCZnzYdQQ8Zb
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false